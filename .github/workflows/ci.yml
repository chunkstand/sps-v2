name: ci

on:
  push:
  pull_request:

jobs:
  app-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync locked dev env
        run: uv sync --extra dev --frozen

      - name: Release manifest integrity
        run: |
          uv run python tools/verify_package_manifest.py

      - name: JSON Schema metaschema validation
        run: |
          uv run check-jsonschema --check-metaschema model/sps/contracts/*.schema.json

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync locked dev env
        run: uv sync --extra dev --frozen

      - name: Run Ruff
        run: |
          uv run ruff check .

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync locked dev env
        run: uv sync --extra dev --frozen

      - name: Run unit tests
        run: |
          uv run pytest -m "unit"

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync locked dev env
        run: uv sync --extra dev --frozen

      - name: Start integration services
        run: |
          docker compose up -d postgres temporal minio minio-init

      - name: Run integration tests
        env:
          SPS_RUN_TEMPORAL_INTEGRATION: "1"
        run: |
          uv run pytest -m "integration"
