name: ci

on:
  push:
  pull_request:

jobs:
  spec-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Repo wiring (spec section 30)
        run: |
          python tools/check_repo_wiring.py

      - name: Package manifest integrity
        run: |
          python tools/verify_package_manifest.py

      - name: JSON Schema metaschema validation
        run: |
          check-jsonschema --check-metaschema model/sps/contracts/*.schema.json
