artifact_metadata:
  artifact_id: ART-SPS-REVIEW-METRICS-001
  authoritative_or_informative: authoritative
  authored_or_generated: authored
  consumer_list:
  - reviewers
  - release_managers
  - governance
  - auditors
  owner: Governance Lead
  freshness_expectation: generated per release candidate
  failure_if_missing: release_block
window_days: 90
general_thresholds:
  pass_lte: 0.25
  warning_gt: 0.25
  release_escalation_gt: 0.35
  blocker_gt: 0.5
critical_path_thresholds:
  pass_lte: 0.2
  warning_gt: 0.2
  release_escalation_gt: 0.3
  blocker_gt: 0.4
emergency_assisted_rules:
  same_pair_same_surface_more_than_once_in_30_days: blocker_pending_redesign_review
  same_pair_emergency_assisted_high_risk_review_volume_gt: 0.1
required_export_fields:
- rolling_window
- denominator_counts
- pair_frequency_table
- critical_path_pair_frequency_table
- emergency_assisted_review_counts
- exceptions_with_linked_override_artifacts
- blocker_determination
