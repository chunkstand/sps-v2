action_defs:
  CreateCase:
    initiator: authenticated_user_or_trusted_intake_api
    preconditions:
    - minimum intake payload present
    - tenant valid
    postconditions_success:
    - PermitCase created in INTAKE_PENDING
    - audit event emitted
    postconditions_failure:
    - no case created
    - error response
    - audit attempt event
  ApproveOutput:
    initiator: reviewer
    preconditions:
    - reviewed object exists
    - reviewer authorized
    - independence passes or explicit exception artifact exists
    forbidden_conditions:
    - same-rank blocking contradiction unresolved
    - stale required evidence
    - reviewer self-approval on high-risk surface without exception
    side_effects:
    - ReviewDecision created
    - case may advance only through guard
  SubmitPackage:
    initiator: submission_service
    preconditions:
    - case state APPROVED_FOR_SUBMISSION
    - active package sealed
    - manifest and digests valid
    - support level not UNSUPPORTED
    side_effects:
    - SubmissionAttempt created
    - portal call executed
    - receipt or failure artifact persisted
    failure_postconditions:
    - case remains in bounded pending or manual state
    - no ambiguous submission state
  DeclareEmergency:
    initiator: escalation_owner
    preconditions:
    - emergency criteria met
    - incident record created
    - scope bounded
    forbidden_conditions:
    - silent skipping of logging
    - silent skipping of evidence capture
    - silent skipping of retroactive cleanup
    side_effects:
    - case or subsystem enters EMERGENCY_HOLD or emergency exception mode
authority_rules:
- PermitCase.case_state writable only by orchestrator runtime with valid transition preconditions
- ReviewDecision writable only by reviewer service
- Policy versions writable only by approved policy mutation workflow
- EvidenceArtifact metadata writable by producing service through evidence registry API
- Observability systems are read-only with respect to authoritative surfaces
